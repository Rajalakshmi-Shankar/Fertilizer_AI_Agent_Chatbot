<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KissanAI — Smart Farming Assistant</title>
<link rel="icon" href="data:,">

<style>
body{
font-family:'Poppins',sans-serif;
background:#e9f9e2;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:90%;
max-width:850px;
text-align:center;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px 18px;
margin:5px;
border-radius:10px;
cursor:pointer;
}

button:hover{background:#45a049;}

.hidden{display:none;}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#f7fff5;
border:1px solid #d9f1d3;
border-radius:15px;
padding:15px;
cursor:pointer;
transition:0.3s;
}

textarea{
width:100%;
height:110px;
margin-top:15px;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

#response{
background:#f0fff0;
margin-top:15px;
padding:15px;
border-radius:10px;
white-space:pre-wrap;
}

.tools{margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<div id="lang-section">
<h1>🌾 Select Language</h1>
<button onclick="selectLang('en')">English</button>
<button onclick="selectLang('ta')">தமிழ்</button>
<button onclick="selectLang('hi')">हिन्दी</button>
</div>

<div id="dashboard" class="hidden">

<h1 id="welcomeMsg"></h1>
<h2 id="title"></h2>

<div class="cards">
<div class="card" onclick="showPopular('fertilizer')" id="fertCard"></div>
<div class="card" onclick="showPopular('weather')" id="weatherCard"></div>
<div class="card" onclick="showPopular('market')" id="marketCard"></div>
<div class="card" onclick="showPopular('organic')" id="organicCard"></div>
</div>

<textarea id="question"></textarea>

<div class="tools">
<button onclick="startMic()">🎤</button>
<button onclick="toggleVoice()">🔊</button>
</div>

<button onclick="sendQuestion()" id="askBtn"></button>
<button style="background:#d32f2f" onclick="clearChat()" id="clearBtn"></button>

<div id="response"></div>
<br>

<button style="background:#2e7d32" onclick="changeLang()" id="langBtn"></button>

</div>
</div>

<script>

let lang="en";
let currentAgent="";
let voiceEnabled=true;

const translations={
en:{welcome:"🌾 Welcome, Farmer!",title:"Fertilizer AI Agent",placeholder:"Type your question here...",fert:"🌾 Fertilizer Recommendation",weather:"🌦️ Weather Insight",market:"💰 Market Prices",organic:"🌱 Organic Farming Tips",ask:"Ask",clear:"🧹 Clear Chat",change:"🌐 Change Language",popular:"🌾 Sample Questions"},
ta:{welcome:"🌾 வணக்கம் விவசாயி!",title:"உரம் AI உதவியாளர்",placeholder:"உங்கள் கேள்வியை இங்கே தட்டச்சு செய்யவும்...",fert:"🌾 உரம் பரிந்துரை",weather:"🌦️ வானிலை தகவல்",market:"💰 சந்தை விலை",organic:"🌱 இயற்கை விவசாய குறிப்புகள்",ask:"கேள்",clear:"🧹 சாட்டை அழி",change:"🌐 மொழி மாற்று",popular:"🌾 மாதிரி கேள்விகள்"},
hi:{welcome:"🌾 नमस्ते किसान!",title:"खाद एआई सहायक",placeholder:"अपना प्रश्न यहां लिखें...",fert:"🌾 उर्वरक सुझाव",weather:"🌦️ मौसम जानकारी",market:"💰 बाजार भाव",organic:"🌱 जैविक खेती सुझाव",ask:"पूछें",clear:"🧹 चैट साफ करें",change:"🌐 भाषा बदलें",popular:"🌾 नमूना प्रश्न"}
};

const popularQs={
en:{
fertilizer:["Best fertilizer for rice?","How much urea to use?","DAP vs NPK difference?","When to apply fertilizer?"],
weather:["Today's weather 🌦️","How to protect crops from rain?","Best season for wheat?","Does humidity affect yield?"],
market:["Current tomato price 💰","Where to sell my crops?","High demand vegetables?","Best time to sell grains?"],
organic:["How to make compost?","Organic pest control?","Crop rotation benefits?","Best organic manure?"]
},
ta:{
fertilizer:["நெல் விளைக்கு சிறந்த உரம் எது?","ஒரு ஏக்கருக்கு எவ்வளவு யூரியா?","DAP மற்றும் NPK வித்தியாசம் என்ன?","உரம் போட சிறந்த நேரம் எது?"],
weather:["இன்றைய வானிலை 🌦️","மழையிலிருந்து பயிர்களை எவ்வாறு காப்பது?","கோதுமை விதைக்க சிறந்த காலம்?","ஈரப்பதம் விளைச்சலை பாதிக்குமா?"],
market:["தக்காளி விலை என்ன? 💰","எங்கே பயிர்களை விற்கலாம்?","அதிக தேவை உள்ள காய்கறிகள்?","தானிய விற்க சிறந்த நேரம்?"],
organic:["கம்போஸ்ட் செய்வது எப்படி?","இயற்கை பூச்சிக்கொல்லிகள்?","பயிர் மாறுதல் நன்மைகள்?","சிறந்த உயிர் உரம்?"]
},
hi:{
fertilizer:["धान के लिए सबसे अच्छा खाद कौन सा है?","एक एकड़ में कितना यूरिया चाहिए?","DAP और NPK में क्या फर्क है?","खाद कब डालना चाहिए?"],
weather:["आज का मौसम 🌦️","फसलों को बारिश से कैसे बचाएं?","गेहूं बोने का सही समय?","क्या नमी पैदावार को प्रभावित करती है?"],
market:["टमाटर का भाव क्या है? 💰","फसल कहाँ बेचें?","कौन सी सब्ज़ियाँ ज़्यादा मांग में हैं?","अनाज बेचने का सही समय?"],
organic:["कम्पोस्ट कैसे बनाएं?","जैविक कीटनाशक कौन से हैं?","फसल चक्रण के फायदे?","सबसे अच्छा जैविक खाद कौन सा है?"]
}
};

function speak(text){
if(!voiceEnabled) return;

const synth = window.speechSynthesis;

function speakNow(){

const msg = new SpeechSynthesisUtterance(text);

msg.lang =
lang==="ta" ? "ta-IN" :
lang==="hi" ? "hi-IN" :
"en-IN";

const voices = synth.getVoices();

let selectedVoice =
voices.find(v => v.lang === msg.lang) ||
voices.find(v => v.lang.startsWith(lang));

if(selectedVoice){
msg.voice = selectedVoice;
}

msg.rate = 0.95;
msg.pitch = 1;

synth.cancel();
synth.speak(msg);
}

// wait for voices to load
if(synth.getVoices().length === 0){
synth.onvoiceschanged = speakNow;
}else{
speakNow();
}

}

function toggleVoice(){voiceEnabled=!voiceEnabled;}

function startMic(){
const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang=lang==="ta"?"ta-IN":lang==="hi"?"hi-IN":"en-IN";
recognition.start();
recognition.onresult=e=>{
document.getElementById("question").value=e.results[0][0].transcript;
};
}

function selectLang(selected){

lang=selected;
const t=translations[selected];

document.getElementById("welcomeMsg").innerText=t.welcome;
document.getElementById("title").innerText=t.title;
document.getElementById("question").placeholder=t.placeholder;

document.getElementById("fertCard").innerText=t.fert;
document.getElementById("weatherCard").innerText=t.weather;
document.getElementById("marketCard").innerText=t.market;
document.getElementById("organicCard").innerText=t.organic;

document.getElementById("askBtn").innerText=t.ask;
document.getElementById("clearBtn").innerText=t.clear;
document.getElementById("langBtn").innerText=t.change;

document.getElementById("lang-section").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

speak(t.welcome);
}

function showPopular(agent){
currentAgent=agent;
const res=document.getElementById("response");
res.innerHTML="<b>"+translations[lang].popular+"</b><br><br>";

popularQs[lang][agent].forEach(q=>{
res.innerHTML+=`<button onclick="sendQuestionPrompt('${q}')">${q}</button>`;
});
}

function sendQuestionPrompt(q){
document.getElementById("question").value=q;
sendQuestion();
}

async function sendQuestion(){

document.getElementById("response").innerText="Thinking...";

const res=await fetch("/ask",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
question:document.getElementById("question").value,
language:lang
})
});

const data=await res.json();
document.getElementById("response").innerText=data.reply;
speak(data.reply);
}

async function clearChat(){
document.getElementById("question").value="";
document.getElementById("response").innerText="";
await fetch("/clear",{method:"POST"});
}

function changeLang(){
document.getElementById("dashboard").classList.add("hidden");
document.getElementById("lang-section").classList.remove("hidden");
}

</script>

</body>
</html>
