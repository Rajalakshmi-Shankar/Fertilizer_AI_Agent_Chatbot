<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KissanAI — Smart Farming Assistant</title>

<style>
body {font-family:'Poppins',sans-serif;background:#e9f9e2;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container{background:white;border-radius:20px;padding:30px;box-shadow:0 5px 20px rgba(0,0,0,0.1);width:90%;max-width:800px;text-align:center;}
button{background:#4CAF50;color:white;border:none;padding:10px 20px;margin:5px;border-radius:10px;cursor:pointer;}
button:hover{background:#45a049;}
.hidden{display:none;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;margin-top:20px;}
.card{background:#f7fff5;border:1px solid #d9f1d3;border-radius:15px;padding:15px;cursor:pointer;transition:0.3s;}
.card:hover{transform:scale(1.05);background:#e9f9e2;}
textarea{width:100%;height:100px;margin-top:15px;padding:10px;border-radius:10px;border:1px solid #ccc;resize:none;}
#response{background:#f0fff0;margin-top:15px;padding:15px;border-radius:10px;white-space:pre-wrap;}
</style>

</head>

<body>

<div class="container">

<div id="lang-section">
<h1>🌾 Welcome to AI Agent</h1>
<p>Select your language:</p>
<button onclick="selectLang('en')">English</button>
<button onclick="selectLang('ta')">தமிழ்</button>
<button onclick="selectLang('hi')">हिन्दी</button>
</div>

<div id="dashboard" class="hidden">

<h1 id="welcomeMsg"></h1>
<h2 id="title"></h2>

<div class="cards">
<div class="card" onclick="showPopular('fertilizer')" id="fertCard"></div>
<div class="card" onclick="showPopular('weather')" id="weatherCard"></div>
<div class="card" onclick="showPopular('market')" id="marketCard"></div>
<div class="card" onclick="showPopular('organic')" id="organicCard"></div>
</div>

<textarea id="question"></textarea>

<button onclick="sendQuestion()" id="askBtn"></button>
<button style="background:#d32f2f" onclick="clearChat()" id="clearBtn"></button>

<div id="response"></div>
<br>

<button style="background:#2e7d32" onclick="changeLang()" id="langBtn"></button>

</div>
</div>

<script>

let lang="en";
let currentAgent="";

const translations={
en:{welcome:"🌾 Welcome, Farmer!",title:"Fertilizer AI Agent",placeholder:"Type your question here...",fert:"🌾 Fertilizer Recommendation",weather:"🌦️ Weather Insight",market:"💰 Market Prices",organic:"🌱 Organic Farming Tips",ask:"Ask",clear:"🧹 Clear Chat",change:"🌐 Change Language",popular:"🌾 Popular Questions"},
ta:{welcome:"🌾 வணக்கம் விவசாயி!",title:"உரம் AI உதவியாளர்",placeholder:"உங்கள் கேள்வியை இங்கே தட்டச்சு செய்யவும்...",fert:"🌾 உரம் பரிந்துரை",weather:"🌦️ வானிலை தகவல்",market:"💰 சந்தை விலை",organic:"🌱 இயற்கை விவசாய குறிப்புகள்",ask:"கேள்",clear:"🧹 சாட்டை அழி",change:"🌐 மொழி மாற்று",popular:"🌾 பொதுவான கேள்விகள்"},
hi:{welcome:"🌾 नमस्ते किसान!",title:"खाद एआई सहायक",placeholder:"अपना प्रश्न यहां लिखें...",fert:"🌾 उर्वरक सुझाव",weather:"🌦️ मौसम जानकारी",market:"💰 बाजार भाव",organic:"🌱 जैविक खेती सुझाव",ask:"पूछें",clear:"🧹 चैट साफ करें",change:"🌐 भाषा बदलें",popular:"🌾 लोकप्रिय प्रश्न"}
};

const popularQs={
en:{
fertilizer:["Best fertilizer for rice?","How much urea to use?","DAP vs NPK difference?","When to apply fertilizer?"],
weather:["Today's weather 🌦️","How to protect crops from rain?","Best season for wheat?","Does humidity affect yield?"],
market:["Current tomato price 💰","Where to sell my crops?","High demand vegetables?","Best time to sell grains?"],
organic:["How to make compost?","Organic pest control?","Crop rotation benefits?","Best organic manure?"]
},
ta:{
fertilizer:["நெல் விளைக்கு சிறந்த உரம் எது?","ஒரு ஏக்கருக்கு எவ்வளவு யூரியா?","DAP மற்றும் NPK வித்தியாசம் என்ன?","உரம் போட சிறந்த நேரம் எது?"],
weather:["இன்றைய வானிலை 🌦️","மழையிலிருந்து பயிர்களை எவ்வாறு காப்பது?","கோதுமை விதைக்க சிறந்த காலம்?","ஈரப்பதம் விளைச்சலை பாதிக்குமா?"],
market:["தக்காளி விலை என்ன? 💰","எங்கே பயிர்களை விற்கலாம்?","அதிக தேவை உள்ள காய்கறிகள்?","தானிய விற்க சிறந்த நேரம்?"],
organic:["கம்போஸ்ட் செய்வது எப்படி?","இயற்கை பூச்சிக்கொல்லிகள்?","பயிர் மாறுதல் நன்மைகள்?","சிறந்த உயிர் உரம்?"]
},
hi:{
fertilizer:["धान के लिए सबसे अच्छा खाद कौन सा है?","एक एकड़ में कितना यूरिया चाहिए?","DAP और NPK में क्या फर्क है?","खाद कब डालना चाहिए?"],
weather:["आज का मौसम 🌦️","फसलों को बारिश से कैसे बचाएं?","गेहूं बोने का सही समय?","क्या नमी पैदावार को प्रभावित करती है?"],
market:["टमाटर का भाव क्या है? 💰","फसल कहाँ बेचें?","कौन सी सब्ज़ियाँ ज़्यादा मांग में हैं?","अनाज बेचने का सही समय?"],
organic:["कम्पोस्ट कैसे बनाएं?","जैविक कीटनाशक कौन से हैं?","फसल चक्रण के फायदे?","सबसे अच्छा जैविक खाद कौन सा है?"]
}
};

function formatIndianCurrency(text){
return text.replace(/\$/g,"₹").replace(/USD/g,"₹").replace(/INR/g,"₹");
}

function speak(text){
const msg=new SpeechSynthesisUtterance(text);
msg.lang = lang==="ta"?"ta-IN":lang==="hi"?"hi-IN":"en-US";
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

function selectLang(selected){
lang=selected;
const t=translations[selected];

welcomeMsg.innerText=t.welcome;
title.innerText=t.title;
question.placeholder=t.placeholder;

fertCard.innerText=t.fert;
weatherCard.innerText=t.weather;
marketCard.innerText=t.market;
organicCard.innerText=t.organic;

askBtn.innerText=t.ask;
clearBtn.innerText=t.clear;
langBtn.innerText=t.change;

lang-section.classList.add("hidden");
dashboard.classList.remove("hidden");

speak(t.welcome);
}

function showPopular(agent){
currentAgent=agent;
const resDiv=response;
resDiv.innerHTML="<b>"+translations[lang].popular+"</b><br><br>";

popularQs[lang][agent].forEach(q=>{
resDiv.innerHTML+=`<button onclick="sendQuestionPrompt('${q}')">${q}</button>`;
});
}

function sendQuestionPrompt(q){
question.value=q;
sendQuestion();
}

async function sendQuestion(){
response.innerText="Thinking...";

const res=await fetch("/ask",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({question:question.value,language:lang})
});

const data=await res.json();

let reply=data.reply;

if(currentAgent==="market"){
reply=formatIndianCurrency(reply);
}

response.innerText=reply;
speak(reply);
}

async function clearChat(){
question.value="";
response.innerText="";
await fetch("/clear",{method:"POST"});
}

function changeLang(){
dashboard.classList.add("hidden");
lang-section.classList.remove("hidden");
response.innerText="";
question.value="";
}

</script>

</body>
</html>
